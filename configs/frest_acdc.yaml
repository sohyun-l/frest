data:
  class_path: data_modules.CombinedDataModule
  init_args:
    batch_size: 1
    num_workers: 4
    load_config:
      train:
        ACDC:
          load_pseudo_labels: True
          pseudo_label_dir: pseudo_labels_train_ACDC_cma_segformer
          load_keys:
            - image
            - semantic
            - image_ref
          transforms:
            - class_path: data_modules.transforms.ToTensor
            - class_path: data_modules.transforms.RandomCrop
              init_args:
                size:
                  - 1080
                  - 1080
                cat_max_ratio: 0.75
            - class_path: data_modules.transforms.RandomHorizontalFlip
            - class_path: data_modules.transforms.ConvertImageDtype
            - class_path: data_modules.transforms.Normalize
      val:
        ACDC:
          load_keys:
            - image
            - semantic
          transforms:
            - class_path: data_modules.transforms.ToTensor
            - class_path: data_modules.transforms.ConvertImageDtype
            - class_path: data_modules.transforms.Normalize
      test:
        ACDC:
          load_keys:
            - image
            - semantic
          transforms:
            - class_path: data_modules.transforms.ToTensor
            - class_path: data_modules.transforms.ConvertImageDtype
            - class_path: data_modules.transforms.Normalize
      predict:
        ACDC:
          predict_on: test
          load_keys:
            - image
          transforms:
            - class_path: data_modules.transforms.ToTensor
            - class_path: data_modules.transforms.ConvertImageDtype
            - class_path: data_modules.transforms.Normalize
model:
  class_path: models.FREST
  init_args:
    entropy_loss_weight: 0.01
    contrastive_loss_weight: 0.01
    discriminator_weight: 0.01
    freeze_decoder: True
    projection_head_lr_factor: 10.0
    epoch_search: 1
    head_lr_factor: 1
    projector_lr: 0.001
    grad_clip: 0
    use_seg: True
    ema_momentum: 0.9999
    backbone:
      class_path: models.backbones.MixVisionTransformerStrainer
      init_args:
        model_type: mit_b5
        pretrained: cityscapes
        d_init: he_uniform
        u_init: zero
    head:
      class_path: models.heads.SegFormerHead
      init_args:
        in_channels: [64, 128, 320, 512]
        in_index: [0, 1, 2, 3]
        channels: 768
        num_classes: 19
        input_transform: multiple_select
        pretrained: cityscapes
    contrastive_head:
      class_path: models.heads.ProjectionHead
      init_args:
        in_channels: [64, 128, 320, 512]
        in_index: [0, 1, 2, 3]
        channels: 128
        input_transform: resize_concat
    alignment_backbone:
      class_path: models.backbones.VGG
      init_args:
        model_type: vgg16
        pretrained: imagenet
        out_indices: [2, 3, 4]
    alignment_head:
      class_path: models.heads.UAWarpCHead
      init_args:
        in_index: [0, 1]
        input_transform: multiple_select
        estimate_uncertainty: True
        pretrained: ./pretrained_models/uawarpc_megadepth.ckpt
    self_training_loss:
      class_path: torch.nn.CrossEntropyLoss
      init_args:
        ignore_index: 255
    entropy_loss:
      class_path: models.losses.NormalizedEntropyLoss
    contrastive_loss_out:
      class_path: models.losses.ConditionContrastiveSampler
      init_args:
        feat_dim: 128
        temperature: 0.3
        num_grid: 7
        queue_len: 65536
        warm_up_steps: 2500
        confidence_threshold: 0.2
    metrics:
      val:
        ACDC:
          - class_path: helpers.metrics.IoU
            init_args:
              num_classes: 19
              ignore_index: 255
              average: macro
      test:
        ACDC:
          - class_path: helpers.metrics.IoU
            init_args:
              num_classes: 19
              ignore_index: 255
              average: macro
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.0005
    weight_decay: 0.01
lr_scheduler:
  class_path: helpers.lr_scheduler.LinearWarmupLinearLR
  init_args:
    warmup_iters: 1500
    warmup_ratio: 0.000005
    max_steps: 60000
trainer:
  max_steps: 70000
  val_check_interval: 4000
  check_val_every_n_epoch: null
  sync_batchnorm: True
  accelerator: gpu
  devices: 1
  precision: 16
  logger:
    class_path: pytorch_lightning.loggers.CSVLogger
    init_args:
      save_dir: ./outputs
  callbacks:
    - class_path: pytorch_lightning.callbacks.LearningRateMonitor
    - class_path: pytorch_lightning.callbacks.ModelCheckpoint
      init_args:
        every_n_train_steps: 4000
        save_top_k: -1
